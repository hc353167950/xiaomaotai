name: Auto Tag and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/keep_alive_heartbeat.json'
      - '.github/workflows/keep_alive.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # keep-alive 机器人提交不打 tag / release
    if: ${{ github.event_name == 'workflow_dispatch' || (!contains(github.event.head_commit.message, 'keep_alive') && !contains(github.event.head_commit.message, 'heartbeat')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version and tag
        id: meta
        run: |
          set -euo pipefail

          VERSION_NAME=$(grep -E 'versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=' app/build.gradle.kts | head -1 | sed -E 's/[^0-9]//g')
          if [ -z "${VERSION_NAME}" ]; then VERSION_NAME="0.0.0"; fi
          if [ -z "${VERSION_CODE}" ]; then VERSION_CODE="0"; fi

          DATE_TAG=$(TZ=Asia/Shanghai date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION_NAME}-${DATE_TAG}-${SHORT_SHA}"

          # HEAD 已有 tag 则复用
          if EXISTING=$(git describe --exact-match --tags HEAD 2>/dev/null); then
            TAG="${EXISTING}"
            echo "reuse_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "reuse_tag=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "version_name=${VERSION_NAME}"
            echo "version_code=${VERSION_CODE}"
            echo "short_sha=${SHORT_SHA}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

          echo "Tag: ${TAG}"
          echo "versionName: ${VERSION_NAME} versionCode: ${VERSION_CODE}"

      - name: Create and push tag
        if: steps.meta.outputs.reuse_tag != 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag already exists remotely/local: ${TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Auto release ${TAG}

          versionName: ${VERSION_NAME}
          commit: ${GITHUB_SHA}
          actor: ${GITHUB_ACTOR}
          "
          git push origin "refs/tags/${TAG}"
          echo "Created tag: ${TAG}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore (optional)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_KEYSTORE_BASE64:-}" ] && [ -n "${RELEASE_KEY_PASSWORD:-}" ] && [ -n "${RELEASE_STORE_PASSWORD:-}" ]; then
            echo "${RELEASE_KEYSTORE_BASE64}" | base64 -d > app/xiaomaotai-release-key.jks
            echo "has_release_keystore=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore decoded"
          else
            echo "has_release_keystore=false" >> "$GITHUB_OUTPUT"
            echo "No release keystore secrets; will publish debug APK only"
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        if: steps.keystore.outputs.has_release_keystore == 'true'
        env:
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect artifacts
        id: artifacts
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          HAS_RELEASE: ${{ steps.keystore.outputs.has_release_keystore }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          FILES=()

          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "${DEBUG_APK}" ]; then
            OUT="dist/release/xiaomaotai-${VERSION_NAME}-debug-${TAG}.apk"
            cp "${DEBUG_APK}" "${OUT}"
            FILES+=("${OUT}")
            echo "debug_apk=${OUT}" >> "$GITHUB_OUTPUT"
          fi

          if [ "${HAS_RELEASE}" = "true" ]; then
            RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1 || true)
            if [ -n "${RELEASE_APK}" ]; then
              OUT="dist/release/xiaomaotai-${VERSION_NAME}-release-${TAG}.apk"
              cp "${RELEASE_APK}" "${OUT}"
              FILES+=("${OUT}")
              echo "release_apk=${OUT}" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No APK artifacts found" >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          ls -lh dist/release/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          HAS_RELEASE: ${{ steps.keystore.outputs.has_release_keystore }}
        run: |
          set -euo pipefail

          # 已有同名 Release 则先删掉再重建（同 tag 重跑）
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} exists, deleting..."
            gh release delete "${TAG}" --yes
          fi

          NOTES="## 小茅台 ${VERSION_NAME}

          - **Tag**: \`${TAG}\`
          - **versionName**: ${VERSION_NAME}
          - **versionCode**: ${VERSION_CODE}
          - **Commit**: ${GITHUB_SHA}
          - **SHA**: ${SHORT_SHA}

          ### 安装包
          - 已附带 **debug** APK，可直接安装调试
          "

          if [ "${HAS_RELEASE}" = "true" ]; then
            NOTES="${NOTES}
          - 已附带 **release** 签名 APK
          "
          else
            NOTES="${NOTES}
          - 未配置 release 签名 secrets，本次仅上传 debug APK
          - 需要正式包时在仓库 Secrets 配置：
            - \`RELEASE_KEYSTORE_BASE64\`（jks 的 base64）
            - \`RELEASE_STORE_PASSWORD\`
            - \`RELEASE_KEY_PASSWORD\`
          "
          fi

          mapfile -t ASSETS < <(find dist/release -name "*.apk" | sort)

          gh release create "${TAG}" \
            --title "v${VERSION_NAME} (${TAG})" \
            --notes "${NOTES}" \
            "${ASSETS[@]}"

          echo "Release created: ${TAG}"
          for f in "${ASSETS[@]}"; do echo "  - $f"; done
